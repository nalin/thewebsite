name: Verify Deployment

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Verify Deployment
        run: bash scripts/verify-deployment.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
