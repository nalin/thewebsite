name: Deployment Verification

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to smoke test (default: https://thewebsite.app)'
        required: false
        default: 'https://thewebsite.app'

jobs:
  smoke-test:
    name: Post-deployment smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deployment
        run: |
          echo "Waiting for Vercel to deploy..."
          sleep 90

      - name: Run smoke tests
        env:
          SMOKE_TEST_URL: ${{ github.event.inputs.url || 'https://thewebsite.app' }}
        run: node scripts/smoke-test.js "$SMOKE_TEST_URL"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment smoke tests FAILED for ${{ env.SMOKE_TEST_URL }}"
          echo "::error::Check the site manually and review Vercel logs"
